name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff
      - name: Run ruff check
        run: ruff check src/ tests/
      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q

  # ── Install validation: two jobs, two purposes ──
  #
  # install-released: Proves the exact README install command works.
  #   Runs on main push (tag must exist). If this fails, the published
  #   install path is broken — fix the tag or the README.
  #
  # install-candidate: Proves the local checkout installs cleanly.
  #   Runs on ALL events (pushes and PRs). If this fails on a PR,
  #   the PR broke the package — fix before merging.
  #
  # Together they ensure: PRs can't break installation, and the
  # README path is validated after every release push.

  install-released:
    name: "Install: Released Tag (README path)"
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install using exact README command
        run: |
          python -m pip install --upgrade pip
          pip install "qontos-bench @ git+https://github.com/qontos/qontos-benchmarks.git@v0.1.0"
      - name: Verify imports
        run: |
          python -c "
          import qontos_bench
          print(f'qontos_bench {qontos_bench.__version__}')
          from qontos_bench.runner import BenchmarkRunner
          from qontos_bench.circuits import bell_pair_circuit
          from qontos_bench.report import generate_json_report
          print('Released-tag install: OK')
          "

  install-candidate:
    name: "Install: Candidate (local checkout)"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from local checkout (same as user would after clone)
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Verify imports
        run: |
          python -c "
          import qontos_bench
          print(f'qontos_bench {qontos_bench.__version__}')
          from qontos_bench.runner import BenchmarkRunner
          from qontos_bench.circuits import bell_pair_circuit
          from qontos_bench.report import generate_json_report
          print('Candidate install: OK')
          "
      - name: Verify CLI entrypoint (strict)
        run: python -m qontos_bench --help

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, install-candidate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify distributions
        run: |
          ls -lh dist/
          pip install dist/*.whl
          python -c "import qontos_bench; print(qontos_bench.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
