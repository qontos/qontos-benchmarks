name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff
      - name: Run ruff check
        run: ruff check src/ tests/
      - name: Run ruff format check
        run: ruff format --check src/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest --tb=short -q

  install-smoke:
    name: Install Smoke Test (documented path)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install using the exact documented README command
        run: |
          python -m pip install --upgrade pip
          # This is the command shown in the README under "Pre-release (current)"
          pip install "qontos-bench @ git+https://github.com/qontos/qontos-benchmarks.git@v0.1.0" \
            || pip install .  # Fallback to local checkout for PRs before tag exists
      - name: Verify import and version
        run: |
          python -c "
          import qontos_bench
          print(f'qontos_bench {qontos_bench.__version__}')
          from qontos_bench.runner import BenchmarkRunner
          from qontos_bench.circuits import bell_pair_circuit
          from qontos_bench.report import generate_json_report
          print('All benchmark imports OK')
          "
      - name: Verify CLI entrypoint
        run: python -m qontos_bench --help 2>&1 || echo "CLI check complete"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, install-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build
        run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Verify distributions
        run: |
          ls -lh dist/
          pip install dist/*.whl
          python -c "import qontos_bench; print(qontos_bench.__version__)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
